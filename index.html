<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Fotografico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 64px;
      letter-spacing: -2px;
      font-weight: 600;
    }

    h2 {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #666;
    }

    p {
      margin-top: 25px;
      font-size: 16px;
      color: #444;
      max-width: 500px;
      line-height: 1.6;
    }

    .gallery {
      column-count: 3;
      column-gap: 15px;
      padding: 40px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 15px;
      border-radius: 6px;
      cursor: pointer;

      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .gallery img.show {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery img:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    footer {
      text-align: center;
      padding: 50px 20px;
      font-size: 14px;
      color: #888;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    .lightbox.active {
      display: flex;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .gallery { column-count: 2; }
      h1 { font-size: 42px; }
    }

    @media (max-width: 600px) {
      .gallery { column-count: 1; }
      h1 { font-size: 34px; }
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

<header>
  <h1>IL TUO NOME</h1>
  <h2>FOTOGRAFIA</h2>
  <p>Benvenuti nel mio portfolio. Una selezione di immagini che raccontano il mio sguardo sul mondo.</p>
</header>

<section class="gallery">

  <!-- FOTO -->
  <img src="IMG_1263_VSCO.jpeg" loading="lazy" alt="">
  <img src="IMG_2924.jpeg" loading="lazy" alt="">

  <!-- AGGIUNGI ALTRE FOTO QUI -->
  <!-- <img src="foto3.jpg" loading="lazy"> -->

</section>

<footer>
  © 2026 – Portfolio Fotografico
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  const images = document.querySelectorAll(".gallery img");

  // animazione scroll (fade-in)
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  }, { threshold: 0.1 });

  images.forEach(img => {
    observer.observe(img);

    // click per lightbox
    img.addEventListener("click", () => {
      lightbox.classList.add("active");
      lightboxImg.src = img.src;
    });
  });

  // chiudi lightbox cliccando fuori
  lightbox.addEventListener("click", () => {
    lightbox.classList.remove("active");
  });

  // chiudi con ESC
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      lightbox.classList.remove("active");
    }
  });
</script>

</body>
</html>
