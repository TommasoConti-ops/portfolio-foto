<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Fotografico</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 64px;
      font-weight: 600;
      letter-spacing: -2px;
    }

    h2 {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #666;
    }

    .desc-title {
      font-size: 18px;
      font-weight: 500;
      margin-top: 25px;
    }

    .desc-text {
      margin-top: 10px;
      font-size: 15px;
      color: #444;
      max-width: 500px;
      line-height: 1.6;
    }

    .gallery {
      column-count: 3;
      column-gap: 15px;
      padding: 40px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 15px;
      border-radius: 6px;
      cursor: pointer;

      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .gallery img.show {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery img:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    footer {
      text-align: center;
      padding: 50px 20px;
      font-size: 14px;
      color: #888;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.98);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;

      opacity: 0;
      visibility: hidden;
      transition: all 0.25s ease;
    }

    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      transform: scale(0.95);
      transition: transform 0.25s ease;
    }

    .lightbox.active img {
      transform: scale(1);
    }

    /* CLOSE BUTTON */
    .close {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 28px;
      cursor: pointer;
      user-select: none;
      color: #111;
    }

    .close:hover {
      opacity: 0.5;
    }

    /* NAV */
    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      cursor: pointer;
      user-select: none;
      padding: 10px;
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .gallery { column-count: 2; }
      h1 { font-size: 42px; }
    }

    @media (max-width: 600px) {
      .gallery { column-count: 1; }
      h1 { font-size: 34px; }
      .nav { font-size: 30px; }
    }
  </style>
</head>

<body>

<header>
  <h1>IL TUO NOME</h1>
  <h2>FOTOGRAFIA</h2>

  <div class="desc-title">Benvenuti nel mio portfolio</div>
  <div class="desc-text">
    Una selezione di immagini che raccontano il mio sguardo sul mondo.
  </div>
</header>

<section class="gallery">

  <img src="IMG_1263_VSCO.jpeg" loading="lazy">
  <img src="IMG_2924.jpeg" loading="lazy">

</section>

<footer>
  © 2026 – Portfolio Fotografico
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

  <div class="close" id="closeBtn">✕</div>

  <div class="nav prev" id="prev">&#10094;</div>
  <div class="nav next" id="next">&#10095;</div>

  <img id="lightbox-img" src="">
</div>

<script>
  const images = document.querySelectorAll(".gallery img");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  const closeBtn = document.getElementById("closeBtn");
  const prevBtn = document.getElementById("prev");
  const nextBtn = document.getElementById("next");

  let currentIndex = 0;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add("show");
      }
    });
  }, { threshold: 0.1 });

  images.forEach((img, index) => {
    observer.observe(img);

    img.addEventListener("click", () => {
      openLightbox(index);
    });
  });

  function openLightbox(index){
    currentIndex = index;
    lightbox.classList.add("active");
    updateImage();
  }

  function updateImage(){
    lightboxImg.src = images[currentIndex].src;
  }

  function closeLightbox(){
    lightbox.classList.remove("active");
  }

  function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    updateImage();
  }

  function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateImage();
  }

  closeBtn.addEventListener("click", closeLightbox);
  prevBtn.addEventListener("click", prevImage);
  nextBtn.addEventListener("click", nextImage);

  lightbox.addEventListener("click", (e) => {
    if(e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if(!lightbox.classList.contains("active")) return;

    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowRight") nextImage();
    if(e.key === "ArrowLeft") prevImage();
  });
</script>

</body>
</html>
